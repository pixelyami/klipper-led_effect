name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v1.2.3)'
        required: true
      release_name:
        description: 'Release name (optional)'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set.outputs.release_tag }}
      release_version: ${{ steps.set.outputs.release_version }}
    steps:
    - name: Determine release tag and version
      id: set
      shell: bash
      run: |
        if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "Tag is required for workflow dispatch"
            exit 1
          fi
        else
          TAG="${GITHUB_REF##*/}"
        fi
        RELEASE_VERSION="${TAG#v}"
        echo "release_tag=$TAG" >> $GITHUB_OUTPUT
        echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Merge develop into master and tag release
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin develop
        git fetch origin master
        git checkout master
        git merge --no-ff origin/develop -m "Merge develop into master for ${{ steps.set.outputs.release_tag }}"
        git tag -a "${{ steps.set.outputs.release_tag }}" -m "Release ${{ steps.set.outputs.release_tag }}"
        git push origin master
        git push origin "${{ steps.set.outputs.release_tag }}"

  create_release:
    name: Create GitHub Release
    needs: prepare
    runs-on: ubuntu-latest
    steps:
    - name: Create GitHub release (gh)
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ needs.prepare.outputs.release_tag }}"
        RELEASE_NAME="${{ github.event.inputs.release_name || format('Release %s', needs.prepare.outputs.release_tag) }}"
        gh auth setup-git
        gh release create "$TAG" --title "$RELEASE_NAME" --notes "Release $TAG" --repo "$GITHUB_REPOSITORY"

  build:
    name: Build packages
    needs: create_release
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - os: macos-latest
            TARGET: macos
            CMD_BUILD: >
              pyinstaller -F -w -n ledeffect-simulator-macos -p .. app.py &&
              cd dist/ &&
              zip -r9 ledeffect-simulator-macos-${RELEASE_VERSION}.zip ledeffect-simulator-macos.app
            ASSET_MIME: application/zip
          - os: windows-latest
            TARGET: windows
            CMD_BUILD: >
              pyinstaller -F -w -n ledeffect-simulator-win -p .. app.py &&
              mv dist/ledeffect-simulator-win.exe dist/ledeffect-simulator-win-${RELEASE_VERSION}.exe
            ASSET_MIME: application/vnd.microsoft.portable-executable
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare.outputs.release_tag }}

    - name: Set release tag and version
      id: set_release_version
      shell: bash
      run: |
        if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
        else
          TAG="${GITHUB_REF##*/}"
        fi
        if [ -z "$TAG" ]; then
          echo "ERROR: release tag is empty" >&2
          exit 1
        fi
        RELEASE_VERSION="${TAG#v}"
        echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: 3.14
    - uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Ensure Poetry is available on PATH
      shell: bash
      run: |
        echo "Adding poetry to PATH from $HOME/.local/bin"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: cache deps
      id: cache-deps
      uses: actions/cache@v5
      with:
        path: simulator/.venv
        key: pydeps-${{ hashFiles('**/poetry.lock') }}

    - name: Install environment
      working-directory: ./simulator
      shell: bash
      run: poetry install --no-interaction --no-root
      if: steps.cache-deps.outputs.cache-hit != 'true'
    - name: Install root environment
      working-directory: ./simulator
      shell: bash
      run: poetry install --no-interaction
    - name: Build with pyinstaller for ${{ matrix.TARGET }}
      working-directory: ./simulator
      shell: bash
      run: poetry run ${{ matrix.CMD_BUILD }}
    - name: Set asset filename
      id: set_asset_file
      shell: bash
      run: |
        if [ "${{ matrix.TARGET }}" = "macos" ]; then
          OUT_FILE=ledeffect-simulator-macos-${RELEASE_VERSION}.zip
        else
          OUT_FILE=ledeffect-simulator-win-${RELEASE_VERSION}.exe
        fi
        echo "OUT_FILE_NAME=$OUT_FILE" >> $GITHUB_ENV

    - name: Upload release asset via gh
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh auth setup-git
        gh release upload "${{ needs.prepare.outputs.release_tag }}" "simulator/dist/${{ env.OUT_FILE_NAME }}" --clobber --repo "$GITHUB_REPOSITORY"
